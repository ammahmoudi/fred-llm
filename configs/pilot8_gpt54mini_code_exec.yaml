# pilot8 — cx/gpt-5.4-mini via rastar.dev router, code_exec prompt experiment.
# Equation rendered as executable SymPy definitions (see experiments/code_prompt/).
# API key comes from OPENAI_API_KEY in .env

dataset:
  prompts:
    prompts_dir: data/prompts/code_exec/pilot_8
    style: code_exec

model:
  provider: openai
  name: cx/gpt-5.4-mini
  base_url: https://ai-router.rastar.dev/v1
  temperature: 0.1
  max_tokens: 4096
  timeout: 180
  code_exec:
    exec_timeout: 60
    max_repair_rounds: 1

evaluation:
  mode: both
  symbolic_tolerance: 1e-10
  numeric_tolerance: 1e-6
  num_test_points: 100
  type_tolerances:
    series: 0.01
    approx_coef: 0.001
    regularized: 0.001

output:
  dir: outputs/pilot8_gpt54mini_code_exec
  save_predictions: true
  save_metrics: true
  log_level: INFO
