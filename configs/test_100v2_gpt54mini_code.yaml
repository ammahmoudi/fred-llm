# test_100v2 — cx/gpt-5.4-mini via rastar.dev router, code prompt experiment.
# Equation rendered as executable SymPy definitions (see experiments/code_prompt/).
# API key comes from OPENAI_API_KEY in .env

dataset:
  prompts:
    prompts_dir: data/prompts/code/test_100_v2
    style: code

model:
  provider: openai
  name: cx/gpt-5.4-mini
  base_url: https://ai-router.rastar.dev/v1
  temperature: 0.1
  max_tokens: 4096
  timeout: 180

evaluation:
  mode: both
  symbolic_tolerance: 1e-10
  numeric_tolerance: 1e-6
  num_test_points: 100
  type_tolerances:
    series: 0.01
    approx_coef: 0.001
    regularized: 0.001

output:
  dir: outputs/test_100v2_gpt54mini_code
  save_predictions: true
  save_metrics: true
  log_level: INFO
